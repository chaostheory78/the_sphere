<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Portsmouth Sphere AR</title>

  <!--
    Two libraries doing the heavy lifting here:

    1. A-Frame: lets us describe 3D objects (like a sphere) using simple
       HTML-like tags, e.g. <a-sphere>, instead of writing raw 3D math.

    2. AR.js: adds the camera view + GPS + COMPASS tracking on top of
       A-Frame. This is what makes it "AR" instead of just a 3D scene.
       AR.js reads your phone's compass automatically the moment you
       add the gps-new-camera tag below - that's your "full internal
       compass integration", already done for you.
  -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
    /*
      scale-with-distance
      --------------------
      Without this, the sphere is drawn at its true real-world size (radius
      20m). Up close that's fine, but from 500m away it's a tiny speck -
      basically invisible on a phone screen.

      This component runs every frame and re-checks how far away the
      sphere is from you (the camera). The farther away you are, the
      bigger it makes the sphere - cancelling out the "things look smaller
      when far away" effect, so it stays a roughly constant, visible size
      on screen no matter your distance.

      minScale/maxScale just stop it from ever becoming impossibly tiny
      close up or absurdly huge far away.
    */
    AFRAME.registerComponent('scale-with-distance', {
      schema: {
        referenceDistance: {default: 50},  // "normal" size distance, in metres
        minScale: {default: 1},
        maxScale: {default: 60}
      },
      tick: function () {
        var camera = document.querySelector('[gps-new-camera]');
        if (!camera) return;

        var distance = this.el.object3D.position.length();
        var scale = distance / this.data.referenceDistance;
        scale = Math.min(Math.max(scale, this.data.minScale), this.data.maxScale);

        this.el.object3D.scale.set(scale, scale, scale);
      }
    });
  </script>

  <style>
    body { margin: 0; overflow: hidden; }
    /* Small on-screen label so you know it's running */
    #info {
      position: fixed; top: 10px; left: 10px; z-index: 999;
      color: #fff; font-family: sans-serif; font-size: 14px;
      background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="info">Sphere floating ~200m above Portsmouth</div>

  <a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
  >
    <!--
      This is the sphere itself - same idea as sphere.py, just described
      differently since A-Frame builds shapes from tags, not from a math
      formula you write yourself.

      gps-new-entity-place: tells AR.js "anchor this object to this real
      GPS latitude/longitude on Earth", instead of a fixed screen position.

      position="0 200 0": the middle number is height in metres. This is
      what gives you the 200m altitude - AR.js doesn't read altitude from
      GPS (phone GPS altitude is unreliable), so we set it directly here
      instead.

      radius="20": how big the sphere is in real-world metres. Bigger =
      visible from further away. Adjust to taste.
    -->
    <a-sphere
      gps-new-entity-place="latitude: 50.78935368625442; longitude: -1.0842559573721473;"
      position="0 200 0"
      radius="20"
      color="#3aa0ff"
      material="opacity: 0.9; metalness: 0.1; roughness: 0.6;"
      wireframe="false"
      scale-with-distance="referenceDistance: 50; minScale: 1; maxScale: 60;"
    ></a-sphere>

    <!--
      This replaces a normal a-camera. gps-new-camera links your phone's
      real GPS position + compass heading to the virtual camera, so the
      sphere appears to sit in the correct real-world direction as you
      turn around.

      maxDistance is raised well past the default so AR.js won't hide the
      sphere just because you're far from it - otherwise it can vanish
      past a few hundred metres even with the scaling fix above.
    -->
    <a-camera gps-new-camera="gpsMinDistance: 5; maxDistance: 50000;" rotation-reader></a-camera>
  </a-scene>
</body>
</html>
