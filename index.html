<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Portsmouth Sphere AR</title>

  <!--
    Two libraries doing the heavy lifting here:

    1. A-Frame: lets us describe 3D objects (like a sphere) using simple
       HTML-like tags, e.g. <a-sphere>, instead of writing raw 3D math.

    2. AR.js: adds the camera view + GPS + COMPASS tracking on top of
       A-Frame. This is what makes it "AR" instead of just a 3D scene.
       AR.js reads your phone's compass automatically the moment you
       add the gps-new-camera tag below - that's your "full internal
       compass integration", already done for you.
  -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    /* Small on-screen label so you know it's running */
    #info {
      position: fixed; top: 10px; left: 10px; z-index: 999;
      color: #fff; font-family: sans-serif; font-size: 14px;
      background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="info">Sphere floating ~200m above Portsmouth</div>

  <a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
  >
    <!--
      This is the sphere itself - same idea as sphere.py, just described
      differently since A-Frame builds shapes from tags, not from a math
      formula you write yourself.

      gps-new-entity-place: tells AR.js "anchor this object to this real
      GPS latitude/longitude on Earth", instead of a fixed screen position.

      position="0 200 0": the middle number is height in metres. This is
      what gives you the 200m altitude - AR.js doesn't read altitude from
      GPS (phone GPS altitude is unreliable), so we set it directly here
      instead.

      radius="20": how big the sphere is in real-world metres. Bigger =
      visible from further away. Adjust to taste.
    -->
    <a-sphere
      gps-new-entity-place="latitude: 50.78935368625442; longitude: -1.0842559573721473;"
      position="0 200 0"
      radius="20"
      color="#3aa0ff"
      material="opacity: 0.9; metalness: 0.1; roughness: 0.6;"
      wireframe="false"
    ></a-sphere>

    <!--
      This replaces a normal a-camera. gps-new-camera links your phone's
      real GPS position + compass heading to the virtual camera, so the
      sphere appears to sit in the correct real-world direction as you
      turn around.
    -->
    <a-camera gps-new-camera="gpsMinDistance: 5;" rotation-reader></a-camera>
  </a-scene>
</body>
</html>
